{% extends "base.html" %}{% block title %}WannyHotel - Thème{% endblock %}{% block content %}
<div class="page-header"><h1>🎨 Personnalisation</h1></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
<div class="card"><div class="card-header"><h3>🏨 Informations de l'hôtel</h3></div><div class="card-body">
<form method="post">
<div class="form-group"><label>Nom de l'hôtel</label><input type="text" name="hotel_name" value="{{ settings.hotel_name or 'WannyHotel' }}"></div>
<div class="form-group"><label>Adresse</label><input type="text" name="hotel_address" value="{{ settings.hotel_address }}"></div>
<div class="form-row"><div class="form-group"><label>Téléphone</label><input type="text" name="hotel_phone" value="{{ settings.hotel_phone }}"></div>
<div class="form-group"><label>Email</label><input type="email" name="hotel_email" value="{{ settings.hotel_email }}"></div></div>
<div class="form-row"><div class="form-group"><label>N° RC (Registre Commerce)</label><input type="text" name="hotel_rc" value="{{ settings.hotel_rc }}"></div>
<div class="form-group"><label>N° CNPS</label><input type="text" name="hotel_cnps" value="{{ settings.hotel_cnps }}"></div></div>
<button type="submit" class="btn btn-gold" style="width:100%">💾 Sauvegarder</button>
</form></div></div>
<div class="card"><div class="card-header"><h3>🎨 Couleurs</h3></div><div class="card-body">
<form method="post">
<input type="hidden" name="hotel_name" value="{{ settings.hotel_name or 'WannyHotel' }}">
<div class="form-group"><label>Couleur principale</label>
<div style="display:flex;gap:8px;align-items:center"><input type="color" name="theme_color" value="{{ settings.theme_color or '#1a3a5c' }}" style="width:50px;height:40px;border:none;cursor:pointer">
<span style="font-size:12px;color:#888">Sidebar, en-têtes</span></div></div>
<div class="form-group"><label>Couleur accent</label>
<div style="display:flex;gap:8px;align-items:center"><input type="color" name="theme_accent" value="{{ settings.theme_accent or '#B8860B' }}" style="width:50px;height:40px;border:none;cursor:pointer">
<span style="font-size:12px;color:#888">Boutons, liens</span></div></div>
<div style="margin-top:14px">
<p style="font-size:12px;color:#888;margin-bottom:8px">Prévisualisation :</p>
<div style="display:flex;gap:8px">
<div style="width:60px;height:40px;border-radius:6px;background:var(--preview-main,#1a3a5c)" id="prevMain"></div>
<div style="width:60px;height:40px;border-radius:6px;background:var(--preview-accent,#B8860B)" id="prevAccent"></div>
</div></div>
<button type="submit" class="btn btn-gold" style="width:100%;margin-top:14px">🎨 Appliquer</button>
</form></div></div>
</div>
<script>
document.querySelector('[name=theme_color]').addEventListener('input',function(e){document.getElementById('prevMain').style.background=e.target.value});
document.querySelector('[name=theme_accent]').addEventListener('input',function(e){document.getElementById('prevAccent').style.background=e.target.value});
</script>
{% endblock %}
