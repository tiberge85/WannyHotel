{% extends "base.html" %}{% block title %}WannyHotel - Modifier client{% endblock %}{% block content %}
<div class="page-header"><h1>✏️ {{ guest.first_name }} {{ guest.last_name }}</h1></div>
<div class="card" style="max-width:600px"><div class="card-body"><form method="post">
<div class="form-row"><div class="form-group"><label>Prénom *</label><input type="text" name="first_name" value="{{ guest.first_name }}" required></div>
<div class="form-group"><label>Nom *</label><input type="text" name="last_name" value="{{ guest.last_name }}" required></div></div>
<div class="form-row"><div class="form-group"><label>Tél</label><input type="text" name="tel" value="{{ guest.tel or '' }}"></div>
<div class="form-group"><label>Email</label><input type="email" name="email" value="{{ guest.email or '' }}"></div></div>
<div class="form-row"><div class="form-group"><label>Nationalité</label><input type="text" name="nationality" value="{{ guest.nationality or '' }}"></div>
<div class="form-group"><label>Société</label><input type="text" name="company" value="{{ guest.company or '' }}"></div></div>
<div class="form-row"><div class="form-group"><label>Pièce d'identité</label><select name="id_type">{% for t in ['CNI','Passeport','Permis'] %}<option {% if guest.id_type==t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select></div>
<div class="form-group"><label>N°</label><input type="text" name="id_number" value="{{ guest.id_number or '' }}"></div></div>
<div class="form-group"><label><input type="checkbox" name="vip" value="1" {% if guest.vip %}checked{% endif %}> Client VIP</label></div>
<div style="display:flex;gap:8px"><a href="/guests" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary" style="flex:1">💾 Sauvegarder</button></div>
</form></div></div>
{% endblock %}
