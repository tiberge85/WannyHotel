<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WannyHotel - Connexion</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:36px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-box h1{font-size:24px;color:#1a1a2e;margin-bottom:4px}.login-box .sub{font-size:12px;color:#888;margin-bottom:24px}
.form-group{margin-bottom:14px;text-align:left}.form-group label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:3px}
.form-group input{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px}
.form-group input:focus{outline:none;border-color:#d4a574}
.btn-login{width:100%;padding:12px;background:#d4a574;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}.btn-login:hover{background:#c49564}
.flash{background:#fde8e8;color:#c53030;padding:8px;border-radius:6px;margin-bottom:12px;font-size:12px}
.back{margin-top:14px;font-size:12px}.back a{color:#d4a574;text-decoration:none}
</style></head><body>
<div class="login-box"><h1>🏨 WannyHotel</h1><div class="sub">Connexion</div>
{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}{% endwith %}
<form method="post"><div class="form-group"><label>Identifiant</label><input type="text" name="username" required autofocus></div>
<div class="form-group"><label>Mot de passe</label><input type="password" name="password" required></div>
<button type="submit" class="btn-login">Se connecter</button></form>
<div class="back"><a href="/">← Retour</a></div></div></body></html>
