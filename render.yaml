services:
  - type: web
    name: wannyhotel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PERSISTENT_DIR
        value: /data
    disk:
      name: wannyhotel-data
      mountPath: /data
      sizeGB: 1
