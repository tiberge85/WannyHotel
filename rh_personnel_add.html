{% extends "base.html" %}
{% block title %}WannyGest - Ajouter employé{% endblock %}
{% block content %}
<div class="page-header"><h1>➕ Nouvel employé</h1></div>
<div class="card" style="max-width:700px"><div class="card-body"><form method="post">
    <div class="form-row"><div class="form-group"><label>Prénom *</label><input type="text" name="first_name" required></div><div class="form-group"><label>Nom *</label><input type="text" name="last_name" required></div></div>
    <div class="form-row"><div class="form-group"><label>Matricule</label><input type="text" name="matricule" placeholder="EMP-001"></div><div class="form-group"><label>Email</label><input type="email" name="email"></div></div>
    <div class="form-row"><div class="form-group"><label>Téléphone</label><input type="text" name="tel"></div><div class="form-group"><label>Poste</label><input type="text" name="position" placeholder="Ex: Technicien"></div></div>
    <div class="form-row"><div class="form-group"><label>Département</label><input type="text" name="department"></div><div class="form-group"><label>Date d'embauche</label><input type="date" name="hire_date"></div></div>
    <div class="form-row"><div class="form-group"><label>Type de contrat</label><select name="contract_type"><option value="CDI">CDI</option><option value="CDD">CDD</option><option value="Stage">Stage</option><option value="Freelance">Freelance</option></select></div><div class="form-group"><label>Salaire brut (FCFA)</label><input type="number" name="salary" step="1000" value="0"></div></div>
    <div class="form-row"><div class="form-group"><label>Assurance</label><input type="text" name="insurance" placeholder="Ex: MUGEFCI"></div><div class="form-group"><label>N° Assurance</label><input type="text" name="insurance_number"></div></div>
    <div class="form-row"><div class="form-group"><label>Contact urgence</label><input type="text" name="emergency_contact"></div><div class="form-group"><label>Tél urgence</label><input type="text" name="emergency_tel"></div></div>
    <div style="display:flex;gap:10px;margin-top:16px"><a href="/rh/personnel" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary" style="flex:1">✅ Enregistrer</button></div>
</form></div></div>
{% endblock %}
